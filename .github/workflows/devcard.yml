name: Update DevCard

on:
  schedule:
    # Runs every 6 hours (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual triggering from GitHub UI

jobs:
  devcard:
    name: Fetch & Update daily.dev DevCard
    runs-on: ubuntu-latest

    permissions:
      contents: write # needed to commit the updated image

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download DevCard image
        run: |
          mkdir -p assets
          curl -sSL "https://api.daily.dev/devcards/v2/6V7i5p2qmnvQChDvhVigj.png?type=default&r=jgw" \
            --output assets/devcard.png

          # Verify the file was downloaded and is a valid image
          file assets/devcard.png | grep -q "PNG" || (echo "❌ Downloaded file is not a valid PNG" && exit 1)
          echo "✅ DevCard downloaded successfully ($(du -sh assets/devcard.png | cut -f1))"

      - name: Commit & push if image changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/devcard.png

          # Only commit when there is actually a diff (avoids empty commits)
          if git diff --staged --quiet; then
            echo "⏭️ No changes detected — DevCard is already up to date."
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update daily.dev DevCard 🃏 [${TIMESTAMP}] [skip ci]"
            git push
            echo "🚀 DevCard updated and pushed!"
          fi
