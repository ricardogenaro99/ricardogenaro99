name: Actualizar DevCard

on:
  schedule:
    # Se ejecuta cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch: # Permite ejecución manual desde la interfaz de GitHub

jobs:
  devcard:
    name: Descargar y actualizar DevCard de daily.dev
    runs-on: ubuntu-latest

    permissions:
      contents: write      # necesario para hacer commit de la imagen actualizada
      actions: read        # acceso de solo lectura a actions
      checks: none         # sin acceso a checks
      issues: none         # sin acceso a issues
      pull-requests: none  # sin acceso a pull requests

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Descargar imagen de la DevCard
        run: |
          mkdir -p assets
          curl -sSL "https://api.daily.dev/devcards/v2/6V7i5p2qmnvQChDvhVigj.png?type=default&r=jgw" \
            --output assets/devcard.png

          # Verifica que el archivo descargado sea una imagen PNG válida
          file assets/devcard.png | grep -q "PNG" || (echo "❌ El archivo descargado no es un PNG válido" && exit 1)
          echo "✅ DevCard descargada correctamente ($(du -sh assets/devcard.png | cut -f1))"

      - name: Hacer commit y push si la imagen cambió
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/devcard.png

          # Solo hace commit si hay diferencias reales (evita commits vacíos)
          if git diff --staged --quiet; then
            echo "⏭️ Sin cambios detectados — la DevCard ya está actualizada."
          else
            TIMESTAMP=$(date -u "+%Y-%m-%d %H:%M UTC")
            git commit -m "chore: actualizar DevCard de daily.dev 🃏 [${TIMESTAMP}] [skip ci]"
            git push
            echo "🚀 DevCard actualizada y subida!"
          fi
