version: 2

updates:
  # Mantiene las GitHub Actions actualizadas automáticamente
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Lima"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependencias"
      - "github-actions"
